<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor IA — Empreendedores Exponenciais</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS Base -->
    <link rel="stylesheet" href="../css/styles.css">

    <style>
        :root {
            /* Cores padrão mentor (Modern Dark CSM) */
            --mentor-bg: #0a0a0f;
            --mentor-surface: #12121a;
            --mentor-accent: #E8B800; /* CSM Gold */
            --mentor-red: #C8181A;    /* CSM Red */
            --mentor-text: #eee8d5;
            --mentor-border: rgba(232, 184, 0, 0.2);
            --user-bubble: #1e3a5f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--mentor-bg);
            color: var(--mentor-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease;
        }

        /* HEADER PREMIUM */
        .header {
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--mentor-border);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            font-size: 2rem;
            text-shadow: 0 0 20px var(--mentor-accent);
        }

        .header-text h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--mentor-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-text p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* MODO NEOBRUTALISTA (OVERRIDE) */
        body.neo-mode {
            background-color: var(--bg-primary) !important;
            background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px) !important;
            background-size: 30px 30px !important;
            color: var(--text) !important;
        }

        body.neo-mode .header {
            background: var(--bg-surface) !important;
            border-bottom: 5px solid var(--border-color) !important;
            box-shadow: 0 4px 0px var(--shadow-color) !important;
        }

        body.neo-mode .header-text h1 {
            color: var(--text) !important;
        }

        /* MENSAGENS */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding-bottom: 2rem;
        }

        .message .message-content {
            padding: 1.2rem;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.6;
            background: var(--mentor-surface);
            border: 1px solid var(--mentor-border);
        }

        body.neo-mode .message .message-content {
            border: 3px solid var(--neo-black) !important;
            box-shadow: 6px 6px 0px var(--neo-black) !important;
            border-radius: 0 !important;
            background: white !important;
            color: #121212 !important;
        }

        /* OUTROS ESTILOS */
        .input-bar {
            padding: 1.5rem;
            background: var(--mentor-bg);
            border-top: 1px solid var(--mentor-border);
        }

        body.neo-mode .input-bar {
            background: var(--bg-surface) !important;
            border: 4px solid var(--neo-black) !important;
            box-shadow: 8px 8px 0px var(--neo-black) !important;
            margin: 20px;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">🧠</div>
    <div class="header-text">
        <h1>Mentor IA</h1>
        <p>Empreendedores Exponenciais — CSM</p>
    </div>
    <a class="header-btn" href="../index.html" style="margin-left: auto; color: var(--mentor-accent); text-decoration: none; font-weight: bold;">Sair 🏠</a>
</div>

<div class="mode-selector active" id="modeSelector" style="padding: 2rem 3rem; display: flex; gap: 2rem; justify-content: center;">
    <div class="mode-card" id="modeCriar" style="flex: 1; max-width: 400px; background: var(--mentor-surface); border: 2px solid var(--mentor-border); padding: 2rem; cursor: pointer; border-radius: 20px; transition: all 0.3s;">
        <span style="font-size: 3rem; display: block; margin-bottom: 1rem;">🚀</span>
        <h3 style="color: var(--mentor-accent); margin-bottom: 0.5rem;">Quero criar um negócio</h3>
        <p style="font-size: 0.9rem; opacity: 0.8;">Transforme sua ideia em um plano estruturado.</p>
    </div>
    <div class="mode-card" id="modeAvaliar" style="flex: 1; max-width: 400px; background: var(--mentor-surface); border: 2px solid var(--mentor-border); padding: 2rem; cursor: pointer; border-radius: 20px; transition: all 0.3s;">
        <span style="font-size: 3rem; display: block; margin-bottom: 1rem;">📊</span>
        <h3 style="color: var(--mentor-accent); margin-bottom: 0.5rem;">Avaliar meu negócio</h3>
        <p style="font-size: 0.9rem; opacity: 0.8;">Diagnóstico completo de finanças e mercado.</p>
    </div>
</div>

<div class="chat-container">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
        <div style="display: flex; gap: 1rem;">
            <textarea id="userInput" placeholder="Digite sua resposta..." style="flex: 1; background: var(--mentor-surface); border: 1px solid var(--mentor-border); color: white; padding: 1rem; border-radius: 12px; resize: none;"></textarea>
            <button id="sendBtn" style="background: var(--mentor-accent); border: none; padding: 0 1.5rem; border-radius: 12px; cursor: pointer; font-weight: bold;">ENVIAR</button>
        </div>
    </div>
</div>

<button id="resetBtn" title="Reiniciar conversa" style="position: fixed; bottom: 20px; left: 20px; background: var(--mentor-surface); border: 1px solid var(--mentor-border); color: white; padding: 10px 15px; border-radius: 30px; cursor: pointer;">Reiniciar ↺</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/mentor.js"></script>
</body>
</html>
